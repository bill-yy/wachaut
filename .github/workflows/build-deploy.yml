name: Build and Deploy

# Quality gates run on every PR and push. The SFU image is published to GHCR on
# pushes to main — the web+server images are built on the Dokploy host directly.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Quality gates: typecheck all packages + run test suites ──────────
  # A failing typecheck OR test blocks the SFU image publish below.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.ignore-scripts=true

      - name: Typecheck web
        run: pnpm --filter web check

      - name: Typecheck server
        run: pnpm --filter server typecheck

      - name: Typecheck SFU
        run: pnpm --filter sfu typecheck

      - name: Run tests
        # Runs the node:test suites in apps/server, apps/sfu, apps/web.
        # Each package owns its own test script; pnpm -r runs them all.
        # A failing assertion here blocks the SFU image publish below.
        run: pnpm -r test

  # ── Build & push SFU image (only on main pushes) ─────────────────────
  build-sfu:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SFU
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.sfu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sfu:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sfu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
