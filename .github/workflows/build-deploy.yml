name: Build and Deploy

# Only the SFU image is published to GHCR — the web+server combined image is
# built on the Dokploy host directly from source (pushes to main redeploy
# automatically), so it does not need to go through this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'apps/sfu/**'
      - 'docker/Dockerfile.sfu'
      - '.github/workflows/build-deploy.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-sfu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SFU
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.sfu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sfu:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/sfu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
