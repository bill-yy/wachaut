version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wachaut-web.rule=Host(`wachaut.billytech.es`)"
      - "traefik.http.routers.wachaut-web.entrypoints=websecure"
      - "traefik.http.routers.wachaut-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.wachaut-web.loadbalancer.server.port=3000"
    networks:
      - dokploy-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wachaut-server.rule=Host(`wachaut.billytech.es`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.wachaut-server.entrypoints=websecure"
      - "traefik.http.routers.wachaut-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.wachaut-server.loadbalancer.server.port=3001"
    networks:
      - dokploy-network

  coturn:
    image: coturn/coturn:latest
    restart: always
    command:
      - -n
      - --log-file=stdout
      - --min-port=10000
      - --max-port=11000
      - --realm=wachaut.billytech.es
      - --lt-cred-mech
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --stun-only
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "10000-11000:10000-11000/udp"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
