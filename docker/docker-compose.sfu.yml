# Wachaut SFU — Docker Compose for Dokploy
# Builds from Dockerfile and deploys as Docker Compose service

services:
  sfu:
    build:
      context: ..
      dockerfile: Dockerfile
      target: sfu
      args:
        - BUILD_TS=20260626
    container_name: wachaut-sfu
    restart: unless-stopped
    ports:
      - "3002:3002"                        # Socket.IO signaling
      - "20000-20100:20000-20100/udp"      # WebRTC media
    environment:
      - PORT=3002
      - HOST=0.0.0.0
      - RTC_MIN_PORT=20000
      - RTC_MAX_PORT=20100
      - RTC_LISTEN_IP=0.0.0.0
      - RTC_ANNOUNCED_IP=167.86.110.249
      - NUM_WORKERS=4
      - NODE_ENV=production
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
