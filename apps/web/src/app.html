<!DOCTYPE html>
<html lang="es" style="color-scheme: dark;">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Wachaut — Comparte tu pantalla con amigos al instante. Sin registro, sin descargas. Audio incluido y funciona en cualquier navegador." />

		<!-- Icons & theme -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/brand-marks/apple-touch-icon.svg" />
		<meta name="theme-color" content="#000000" />

		<!-- Social -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Wachaut — Comparte tu pantalla al instante" />
		<meta property="og:description" content="Sin registro, sin descargas. Comparte tu pantalla con amigos en segundos." />
		<meta property="og:image" content="/brand-marks/og.svg" />
		<meta name="twitter:card" content="summary_large_image" />

		<!-- Preload fonts (self-hosted, served from /fonts/) -->
		<link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
		<link rel="preload" href="/fonts/bricolage-grotesque-latin.woff2" as="font" type="font/woff2" crossorigin />

		<title>Wachaut</title>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
