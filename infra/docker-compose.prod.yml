# Production compose — run from the infra/ directory (build context is ../..).
# Matches the root docker-compose.yml model: a single combined image (web+server)
# exposed twice via Traefik so /socket.io hits the Node API and everything else
# hits the static site.

services:
  web:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: combined
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wachaut-web.rule=Host(`wachaut.billytech.es`)"
      - "traefik.http.routers.wachaut-web.entrypoints=websecure"
      - "traefik.http.routers.wachaut-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.wachaut-web.loadbalancer.server.port=3000"
    networks:
      - dokploy-network

  server:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: combined
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wachaut-server.rule=Host(`wachaut.billytech.es`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.wachaut-server.entrypoints=websecure"
      - "traefik.http.routers.wachaut-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.wachaut-server.loadbalancer.server.port=3001"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
